<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/table.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/chips.css">
  <link rel="stylesheet" href="css/hud.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/music.css">
  <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body>
  <div id="table-wrap">
    <div id="background-scene"></div>
    <div id="table">
      <div id="round-counter">
        <div class="round-label">ROUND</div>
        <div class="flip-cell"></div>
      </div>
      <div id="dealer-area">
        <div id="dealer-bubble"></div>
        <div id="dealer-avatar">
          <img id="dealer-img" width="88" height="88" alt="Dealer">
        </div>
        <div id="dealer-hand-wrap"></div>
        <div id="timer-ring-container"></div>
      </div>

      <div id="table-center">
        <div class="rule-main rule-line" id="rule-payout">BLACKJACK PAYS 3 TO 2</div>
        <div class="rule-line" id="rule-dealer">Dealer must stand on all 17s</div>
        <div class="rule-line" id="rule-insurance">INSURANCE PAYS 2 TO 1</div>
      </div>

      <div id="players-arc">
        <div class="player-spot empty" id="spot-0"></div>
        <div class="player-spot empty" id="spot-1"></div>
        <div class="player-spot empty" id="spot-2"></div>
        <div class="player-spot empty" id="spot-3"></div>
        <div class="player-spot empty" id="spot-4"></div>
        <div class="player-spot empty" id="spot-5"></div>
      </div>

      <div id="ashtray-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 78" width="100" height="78">
          <defs>
            <linearGradient id="ash-wall-g" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#424558"/>
              <stop offset="40%"  stop-color="#2d3042"/>
              <stop offset="100%" stop-color="#191b28"/>
            </linearGradient>
            <radialGradient id="ash-rim-g" cx="38%" cy="38%" r="65%">
              <stop offset="0%"   stop-color="#515468"/>
              <stop offset="100%" stop-color="#2f3248"/>
            </radialGradient>
            <radialGradient id="ash-bowl-g" cx="42%" cy="55%" r="60%">
              <stop offset="0%"   stop-color="#272318"/>
              <stop offset="65%"  stop-color="#181612"/>
              <stop offset="100%" stop-color="#0f0e0c"/>
            </radialGradient>
            <linearGradient id="ash-gold-g" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#8a6520"/>
              <stop offset="45%"  stop-color="#d4a840"/>
              <stop offset="100%" stop-color="#8a6520"/>
            </linearGradient>
          </defs>

          <!-- Side wall: front-facing cylinder band -->
          <path d="M 4,27 A 46,15 0 0,1 96,27 L 88,57 A 38,10 0 0,1 12,57 Z"
                fill="url(#ash-wall-g)"/>

          <!-- Base (barely visible foot at bottom) -->
          <ellipse cx="50" cy="57" rx="38" ry="10" fill="#131521" opacity="0.9"/>

          <!-- Rim top face -->
          <ellipse cx="50" cy="27" rx="46" ry="15" fill="url(#ash-rim-g)"/>

          <!-- Bowl interior -->
          <ellipse cx="50" cy="29" rx="36" ry="11" fill="url(#ash-bowl-g)"/>

          <!-- Ash residue smudges -->
          <ellipse cx="44" cy="30" rx="17" ry="5"  fill="#222018" opacity="0.65"/>
          <ellipse cx="57" cy="27" rx="11" ry="3"  fill="#2a2720" opacity="0.50"/>
          <ellipse cx="50" cy="33" rx="7"  ry="2"  fill="#201e18" opacity="0.55"/>

          <!-- Gold rim accent -->
          <ellipse cx="50" cy="27" rx="46" ry="15" fill="none"
                   stroke="url(#ash-gold-g)" stroke-width="1.3"/>

          <!-- Glass highlight: sharp arc -->
          <path d="M 12,20 A 46,15 0 0,1 60,13"
                fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2.5"
                stroke-linecap="round"/>
          <!-- Glass highlight: soft bloom -->
          <path d="M 16,19 A 46,15 0 0,1 56,13"
                fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="5"
                stroke-linecap="round"/>

          <!-- Notches -->
          <rect x="43" y="37" width="14" height="7"  rx="2.5" fill="#0c0e16"/>
          <ellipse cx="5"  cy="27" rx="6" ry="5" fill="#0c0e16"/>
          <ellipse cx="95" cy="27" rx="6" ry="5" fill="#0c0e16"/>
          <ellipse cx="50" cy="13" rx="7" ry="3" fill="#0c0e16" opacity="0.55"/>

          <!-- Stub 1: front notch — filter at rim (y≈41), ember into bowl (y≈29) — round 5+ -->
          <g id="ash-stub-1" style="display:none">
            <rect x="47.5" y="28" width="5" height="13" rx="2.5" fill="#dedad0"/>
            <rect x="47.5" y="28" width="5" height="5"  rx="2.5" fill="#b8b5aa"/>
            <rect x="47.5" y="39" width="5" height="2"  rx="1"   fill="#ca8c58"/>
            <circle cx="50" cy="29.5" r="1.5" fill="#ff8c28"/>
            <circle cx="50" cy="29.5" r="3"   fill="#ff5500" opacity="0.20"/>
          </g>

          <!-- Stub 2: right notch — rotate(-90) maps y→LEFT, filter at (94,27), ember at (82,27) — round 10+ -->
          <g id="ash-stub-2" style="display:none" transform="translate(94,27) rotate(-90)">
            <rect x="-2.5" y="0"  width="5" height="13" rx="2.5" fill="#dedad0"/>
            <rect x="-2.5" y="8"  width="5" height="5"  rx="2"   fill="#b8b5aa"/>
            <rect x="-2.5" y="0"  width="5" height="2"  rx="1"   fill="#ca8c58"/>
            <circle cx="0" cy="11.5" r="1.5" fill="#ff8c28"/>
            <circle cx="0" cy="11.5" r="3"   fill="#ff5500" opacity="0.20"/>
          </g>

          <!-- Stub 3: left notch — rotate(90) maps y→RIGHT, filter at (6,27), ember at (18,27) — round 15+, burned out -->
          <g id="ash-stub-3" style="display:none" transform="translate(6,27) rotate(90)">
            <rect x="-2.5" y="0"  width="5" height="13" rx="2.5" fill="#d5d2c8"/>
            <rect x="-2.5" y="8"  width="5" height="5"  rx="2"   fill="#aca9a0"/>
            <rect x="-2.5" y="0"  width="5" height="2"  rx="1"   fill="#bb7c42"/>
            <circle cx="0" cy="11.5" r="1.2" fill="#4a4845" opacity="0.80"/>
          </g>

          <!-- Stub 4: back notch — mostly hidden at top of rim — round 20+ -->
          <g id="ash-stub-4" style="display:none">
            <rect x="47.5" y="7"  width="5" height="8"  rx="2.5" fill="#c8c5ba" opacity="0.50"/>
          </g>
        </svg>
      </div>
    </div>

    <div id="hud">
      <div class="hud-item">
        <div class="hud-label">Balance</div>
        <div class="hud-value gold" id="hud-balance">$0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Bet</div>
        <div class="hud-value" id="hud-bet">$0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Last</div>
        <div class="hud-value" id="hud-win"></div>
      </div>
      <div class="hud-item" style="margin-left:auto; display:flex; align-items:center; gap:12px;">
        <button id="btn-mute" class="mute-btn" title="Toggle sound">🔊</button>
        <input id="sfx-volume" type="range" min="0" max="100" value="100" class="sfx-volume-slider" title="SFX volume">
        <button id="btn-leave" class="hud-leave-btn" title="Leave table">Leave</button>
      </div>
    </div>

    <div id="action-buttons" hidden></div>
    <div id="chip-selector-wrap" hidden></div>
    <div id="host-controls" hidden></div>
    <div id="shoe-display"></div>
    <div id="shuffle-vote-wrap" hidden></div>
    <div id="count-display" hidden>
      <div id="rc-value">RC: +0</div>
      <div id="tc-value">TC: +0.0</div>
    </div>
    <div id="chat-region">
      <div id="chat-panel"></div>
      <div id="emoji-bar"></div>
    </div>
    <div id="music-region">
      <div id="music-panel"></div>
    </div>
    <div id="leaderboard-region"></div>
  </div>
  <script type="module" src="js/game.js"></script>
</body>
</html>
